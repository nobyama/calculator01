<!DOCTYPE html>
<html lang="ja">

<head>
<title>電卓アプリ</title>
<meta charset="utf-8">
<meta name="viewport" content="user-scalable=no, width=device-width, initial-scale=1.5, maximum-scale=1.0" />
<style>
	#表示画面 {
		width: 285px;
		height: 70px;
		border: 1px solid blue;
		border-radius: 10px;
		padding-right: 5px;
		text-align: right;
		font-size: 40px;
		color: white;
		background-color: black;
	}
	.数字ボタン {
		width: 70px;
		height: 70px;
		border: 1px solid blue;
		border-radius: 10px;
		text-align: center;
		font-size: 36px;
		color: white;
		background-color: gray;
		box-shadow: rgb(128, 128, 128) 5px 5px;
	}
	.計算ボタン {
		width: 70px;
		height: 70px;
		border: 1px solid blue;
		border-radius: 10px;
		text-align: center;
		font-size: 36px;
		color: white;
		background-color: navy;
		box-shadow: rgb(128, 128, 128) 5px 5px;
	}

</style>
<script>
let 表示数値 = "";
let 保存数値 = "";
let 四則演算の種類 = "";

function ACクリック(e) {
	document.getElementById("表示画面").innerHTML = "0";
	表示数値 = "";
	保存数値 = ""; 
	四則演算の種類 = "";
}

function 平方根クリック(e) {
	表示数値 = Math.sqrt(表示数値)							// 表示数値の平方根を計算
	表示数値 = Math.round(表示数値 * 1000000000) / 1000000000		// 演算後、小数点8桁で数値を丸める
	document.getElementById("表示画面").innerHTML = 表示数値;
	四則演算の種類 = "=";									// 計算ボタンを押したことを記録（直後に数字ボタンを押した場合の対応用）
	}

function 数字クリック(e) {
	if (四則演算の種類 == "=") {				// 計算ボタン(=)を押した直後であれば、数値を初期化
		ACクリック();
	}
	if (e.value == ".") {						// (1)小数ボタンを押した際の条件分岐
		if (表示数値.indexOf( "." ) == -1) {		// 	表示数値の中に小数点が無い場合、小数点を追加
			表示数値 = 表示数値 + e.value; 	
		}								// 	表示数値の中に小数点がある場合、何もしない
	} else {
		if (表示数値 == "0") {				// (2)数字ボタンを押した際の条件分岐
			表示数値 = "";					// 	表示数値が0の場合のみ、表示数値を一時的に空白とする
		}
		表示数値 = 表示数値 + e.value; 		// 	表示数値に、数字ボタンの値を追加
	 }
	document.getElementById("表示画面").innerHTML = 表示数値;
}

function 四則演算クリック(e) {
	if (保存数値 != "") {						//
		計算クリック();
	}
	保存数値 = 表示数値; 
	表示数値 = "0";
	四則演算の種類 = e.value;
}

function 計算クリック(e) {
	Number(表示数値);						// 演算前に、表示数値と保存数値を文字列→数値とする
	Number(保存数値);
	if (四則演算の種類 == "+") {				// 足し算
		表示数値 = 保存数値 * 1 + 表示数値 * 1;
	} else if (四則演算の種類 == "-") {			// 引き算
		表示数値 = 保存数値 - 表示数値;
	} else if (四則演算の種類 == "×") {			// 掛け算
		表示数値 = 保存数値 * 表示数値;
	} else {								// 割り算
		表示数値 = 保存数値 / 表示数値;
	}
	表示数値 = Math.round(表示数値 * 1000000000) / 1000000000		// 演算後、小数点8桁で数値を丸める
	保存数値 = 0;
	四則演算の種類 = "=";					// 計算ボタンを押したことを記録（直後に数字ボタンを押した場合の対応用）
	表示数値.toString();						// 演算後は、表示数値と保存数値を数値→文字列とする
	保存数値.toString();
	document.getElementById("表示画面").innerHTML = 表示数値;
}

function BSクリック(e) {
	表示数値 = 表示数値.slice(0, 表示数値.length - 1);
	document.getElementById("表示画面").innerHTML = 表示数値;
}

</script>
</head>

<body>
	<div id="表示画面">0</div>
</br>
	<input type="button" class="計算ボタン" onclick="ACクリック(this)" value="AC">
	<input type="button" class="計算ボタン" value="()">
	<input type="button" class="計算ボタン" onclick="平方根クリック(this)" value="√">
	<input type="button" class="計算ボタン" onclick="四則演算クリック(this)" value="÷">
</br>
	<input type="button" class="数字ボタン" onclick="数字クリック(this)" value="7">
	<input type="button" class="数字ボタン" onclick="数字クリック(this)" value="8">
	<input type="button" class="数字ボタン" onclick="数字クリック(this)" value="9">
	<input type="button" class="計算ボタン" onclick="四則演算クリック(this)" value="×">
</br>
	<input type="button" class="数字ボタン" onclick="数字クリック(this)" value="4">
	<input type="button" class="数字ボタン" onclick="数字クリック(this)" value="5">
	<input type="button" class="数字ボタン" onclick="数字クリック(this)" value="6">
	<input type="button" class="計算ボタン" onclick="四則演算クリック(this)" value="ー">
</br>
	<input type="button" class="数字ボタン" onclick="数字クリック(this)" value="1">
	<input type="button" class="数字ボタン" onclick="数字クリック(this)" value="2">
	<input type="button" class="数字ボタン" onclick="数字クリック(this)" value="3">
	<input type="button" class="計算ボタン" onclick="四則演算クリック(this)" value="+">
</br>
	<input type="button" class="数字ボタン" onclick="数字クリック(this)" value="0">
	<input type="button" class="数字ボタン" onclick="数字クリック(this)" value=".">
	<input type="button" class="数字ボタン" onclick="BSクリック(this)" value="BS">
	<input type="button" class="計算ボタン" onclick="計算クリック(this)" value="=">
</br>
<table>
</table>
</body>
</html>
